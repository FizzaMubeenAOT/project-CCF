version: '3.8'

services:
  app:
    build: .
    container_name: edutrack-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:        development
      PORT:            3000
      MONGO_URI:       mongodb://mongo:27017/edutrack
      SESSION_SECRET:  local-dev-secret
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src          # hot reload in dev
      - ./public:/app/public

  mongo:
    image: mongo:6-jammy
    container_name: edutrack-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
